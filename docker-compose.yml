services:
  mongodb:
    image: mongo:7
    container_name: stackshelf-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - stackshelf_mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 4s
      retries: 12

  api:
    build: .
    container_name: stackshelf-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/library_management
      JWT_SECRET: ${JWT_SECRET:-replace-this-before-production-deployment}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LIBRARIAN_INVITE_CODE: ${LIBRARIAN_INVITE_CODE:-library-admin-setup}
      BORROW_DAYS: ${BORROW_DAYS:-14}
      FINE_PER_DAY: ${FINE_PER_DAY:-5}
      RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES:-15}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-300}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5000}
    depends_on:
      mongodb:
        condition: service_healthy

  seed:
    build: .
    profiles: ["tools"]
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/library_management
      JWT_SECRET: ${JWT_SECRET:-replace-this-before-production-deployment}
      LIBRARIAN_INVITE_CODE: ${LIBRARIAN_INVITE_CODE:-library-admin-setup}
    command: ["npm", "run", "seed"]
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  stackshelf_mongodb_data:
